<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DIGITAL THR VAULT | ACCESS GRANTED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #03001c; /* Sangat gelap */
            --card-bg: rgba(18, 18, 35, 0.6); /* Transparan untuk glassmorphism */
            --primary-neon: #00f2fe; /* Cyan neon */
            --secondary-neon: #4facfe; /* Biru neon */
            --accent-neon: #ff0055; /* Pink neon untuk kejutan */
            --text-main: #e0e6ed;
            --font-tech: 'Orbitron', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Latar belakang garis-garis bergerak (Grid Effect) */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Container Utama dengan efek Kaca */
        .thr-vault {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(15px); /* Efek blur kaca */
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .thr-vault::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--primary-neon), transparent 30%);
            animation: rotateBorder 4s linear infinite;
            z-index: -2;
            opacity: 0.3;
        }

        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }

        /* Tampilan ID Card Keren */
        .id-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary-neon);
        }

        .system-status {
            font-family: var(--font-tech);
            color: var(--primary-neon);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            margin-bottom: 10px;
        }

        .target-name {
            font-family: var(--font-tech);
            font-weight: 700;
            font-size: 1.8rem;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 10px var(--primary-neon);
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #a0b0c0;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        /* Tombol Utama yang menyala */
        .btn-claim {
            font-family: var(--font-tech);
            background: transparent;
            border: 2px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .btn-claim:hover {
            background: var(--primary-neon);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--primary-neon);
        }

        /* Pesan setelah diklik */
        #result {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .shopee-text {
            color: #ff4500; /* Warna Shopee */
            font-weight: bold;
        }

        .amount {
            font-family: var(--font-tech);
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-neon);
            margin: 15px 0;
        }
        
        .btn-redirect {
            background: #ff4500; /* Warna Shopee */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="thr-vault" id="mainVault">
    <div id="initialState">
        <div class="id-card">
            <p class="system-status">>> INITIALIZING ACCESS</p>
            <h1 class="target-name" id="display-name">LOADING...</h1>
        </div>
        <p class="sub-text">Sistem mendeteksi kiriman dana khusus. Verifikasi diperlukan.</p>
        <button class="btn-claim" onclick="claimProcess()">UNLOCK DANA THR</button>
    </div>

    <div id="result">
        <div class="id-card">
            <p class="system-status" style="color: var(--accent-neon);">>> TRANSFER GRANTED</p>
            <h1 class="target-name">BERHASIL!</h1>
        </div>
        <p class="sub-text">Dana telah dialokasikan untuk <span id="final-name"></span></p>
        <div class="amount" id="display-amount">Rp 0</div>
        <p class="sub-text">Silakan klik tombol di bawah untuk membuka aplikasi <span class="shopee-text">Shopee</span> dan cek saldo/notifikasi kamu.</p>
        <a href="https://shopee.co.id/m/shopeepay" class="btn-redirect" target="_blank">BUKA SHOPEEPAY</a>
    </div>
</div>

<script>
    // Ambil Data dari URL (Sama kayak logic sebelumnya)
    const urlParams = new URLSearchParams(window.location.search);
    const namaTeman = urlParams.get('nama') || "SOBBAT";
    const nominal = urlParams.get('amount') || "0";

    // Set Nama di Awal
    document.getElementById('display-name').innerText = namaTeman.toUpperCase();

    function claimProcess() {
        // 1. Efek Suara (Optional, kalo mau tambah keren harus host file suara)
        // new Audio('click.mp3').play();

        // 2. Ganti Tampilan dengan Animasi
        document.getElementById('initialState').style.display = 'none';
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        setTimeout(() => resultDiv.style.opacity = '1', 50);

        // 3. Set Nama Final dan Nominal (Format Rupiah)
        document.getElementById('final-name').innerText = namaTeman;
        document.getElementById('display-amount').innerText = "Rp" + parseInt(nominal).toLocaleString('id-ID');

        // 4. Selebrasi Confetti (Warna disesuaikan tema)
        var count = 200;
        var defaults = {
          origin: { y: 0.7 }
        };

        function fire(particleRatio, opts) {
          confetti(Object.assign({}, defaults, opts, {
            particleCount: Math.floor(count * particleRatio)
          }));
        }

        fire(0.25, {
          spread: 26,
          startVelocity: 55,
          colors: ['#00f2fe', '#4facfe', '#ffffff']
        });
        fire(0.2, {
          spread: 60,
          colors: ['#00f2fe', '#ff0055']
        });
        fire(0.35, {
          spread: 100,
          decay: 0.91,
          scalar: 0.8
        });
        fire(0.1, {
          spread: 120,
          startVelocity: 25,
          decay: 0.92,
          scalar: 1.2
        });
        fire(0.1, {
          spread: 120,
          startVelocity: 45,
          colors: ['#ff0055', '#ffffff']
        });
    }
</script>

</body>
</html>
