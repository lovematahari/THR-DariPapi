<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHASIA SAWITTTT</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --ticket-bg: #fff;
            --gold-accent: #bf9b30;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); color: #222;
            font-family: var(--font-body); display: flex; justify-content: center; align-items: center;
        }

        /* Latar Belakang Bokeh */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(191, 155, 48, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        /* --- Tampilan Input Kode (GATE) --- */
        #gate-view {
            background: rgba(20, 20, 20, 0.9); border: 1px solid var(--gold-accent);
            border-radius: 20px; padding: 40px 30px; width: 85%; max-width: 350px;
            text-align: center; color: white; backdrop-filter: blur(10px);
        }

        .gate-title { font-family: var(--font-heading); color: var(--gold-accent); font-size: 1.5rem; margin-bottom: 20px; }
        .input-code {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--gold-accent);
            color: white; font-size: 1.2rem; text-align: center; outline: none; padding: 10px 0; margin-bottom: 30px;
        }
        .btn-open {
            background: var(--gold-accent); color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%;
        }

        /* --- Tampilan Tiket (HASIL) --- */
        #ticket-view { display: none; }
        .ticket-container {
            background: var(--ticket-bg); border-radius: 20px; width: 85%; max-width: 380px;
            text-align: center; box-shadow: 0 15px 50px rgba(191, 155, 48, 0.3);
            position: relative; overflow: hidden; animation: slideUp 0.8s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .ticket-header { background-color: var(--gold-accent); color: #fff; padding: 20px; }
        .ticket-header h1 { font-family: var(--font-heading); font-size: 1.6rem; margin: 0; }
        .ticket-body { padding: 30px; }
        #friend-photo {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 0 auto 20px; display: block;
        }
        .friend-name { font-weight: 700; font-size: 1.4rem; color: var(--gold-accent); margin: 0; }
        .amount { font-family: var(--font-heading); font-size: 2.5rem; border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 10px 0; margin: 20px 0; }
        .btn-wa {
            background: #25d366; color: white; border: none; width: 100%; padding: 18px;
            border-radius: 10px; font-weight: bold; text-decoration: none; display: block; box-sizing: border-box;
        }
    </style>
</head>
<body>

<!-- VIEW 1: GATEKEEPER -->
<div id="gate-view">
    <div class="gate-title">RESTRICTED ACCESS</div>
    <p style="font-size: 0.9rem; margin-bottom: 25px;">ISI NAMA PANGGILAN:</p>
    <input type="text" id="input-access" class="input-code" placeholder="Siapa namamu?" autocomplete="off">
    <button class="btn-open" onclick="checkAccess()">BUKA RAHASIA SAWITT 🗝️</button>
</div>

<!-- VIEW 2: TICKET RESULT -->
<div id="ticket-view">
    <div class="ticket-container">
        <div class="ticket-header"><h1>KM GEYYY KAN ZUZURR</h1></div>
        <div class="ticket-body">
            <img src="" id="friend-photo">
            <p style="font-size: 0.9rem; color: #666; margin:0;">Selamat Lebaran,</p>
            <p class="friend-name" id="display-name"></p>
            <div class="amount" id="display-amount"></div>
            <a href="" id="wa-link" class="btn-wa">KIRIM BUKTI KE PAPI 📲</a>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const namaTarget = urlParams.get('nama') || "";
    const nominal = urlParams.get('amount') || "0";
    const myWA = "6287768314233";

    function checkAccess() {
        const inputVal = document.getElementById('input-access').value.trim().toLowerCase();
        const namaBener = namaTarget.toLowerCase().trim();

        // Validasi: Harus sama dengan nama di URL
        if (inputVal === namaBener && namaBener !== "") {
            unlockTicket();
        } else {
            alert("Salah anjay.");
        }
    }

    function unlockTicket() {
        document.getElementById('gate-view').style.display = 'none';
        document.getElementById('ticket-view').style.display = 'flex';
        
        // Isi Data
        document.getElementById('display-name').innerText = namaTarget.toUpperCase();
        document.getElementById('display-amount').innerText = "Rp" + parseInt(nominal).toLocaleString('id-ID');
        
        // Pasang Foto .jpeg kamu
        const photoImg = document.getElementById('friend-photo');
        photoImg.src = namaTarget.toLowerCase() + ".jpeg";

        // Pasang Link WA
        const msg = `Hai Aku ${namaTarget} Sudah Klik Rp${parseInt(nominal).toLocaleString('id-ID')}. Claim Now`;
        document.getElementById('wa-link').href = `https://wa.me/${myWA}?text=${encodeURIComponent(msg)}`;

        // Confetti Emas
        confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#bf9b30', '#ffffff'] });
    }
</script>
</body>
</html>
