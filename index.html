<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punten SAwIIITT | Spesial kayak martabak</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --ticket-bg: #fff;
            --text-dark: #222;
            --gold-accent: #bf9b30; /* Emas Klasik */
            --wa-green: #25d366;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); color: var(--text-dark);
            font-family: var(--font-body); display: flex; justify-content: center; align-items: center;
        }

        /* Latar Belakang Bokeh Emas */
        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 50% 50%, rgba(191, 155, 48, 0.15) 0%, transparent 80%);
            z-index: -1;
        }

        /* Container Tiket Utama */
        .ticket-container {
            background: var(--ticket-bg); border-radius: 20px;
            width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 15px 50px rgba(191, 155, 48, 0.2);
            position: relative; overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Bagian Atas Tiket */
        .ticket-header {
            background-color: var(--gold-accent); color: #fff;
            padding: 20px; position: relative;
        }

        .ticket-header h1 {
            font-family: var(--font-heading); font-size: 1.8rem;
            margin: 0; letter-spacing: 1px;
        }

        /* Efek Bolongan Tiket (Khas Tiket Konser) */
        .ticket-header::after {
            content: ''; position: absolute; bottom: -15px; left: -15px;
            width: 30px; height: 30px; background-color: var(--bg-color);
            border-radius: 50%;
        }

        .ticket-header::before {
            content: ''; position: absolute; bottom: -15px; right: -15px;
            width: 30px; height: 30px; background-color: var(--bg-color);
            border-radius: 50%;
        }

        /* Bagian Isi Tiket */
        .ticket-body { padding: 30px; }

        /* Foto Bulat Teman */
        #friend-photo {
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
            border: 5px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin: 0 auto 20px; display: block;
        }

        .personal-msg { font-size: 1rem; color: #555; margin-bottom: 5px; }
        .friend-name { font-weight: 700; font-size: 1.5rem; color: var(--gold-accent); margin-bottom: 25px; }

        .amount {
            font-family: var(--font-heading); font-size: 2.8rem;
            color: var(--text-dark); margin: 15px 0 5px;
            border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc;
            padding: 10px 0;
        }

        .sub-text { font-size: 0.8rem; color: #888; margin-bottom: 30px; }

        /* Tombol WhatsApp (Anti-Macet) */
        .btn-wa {
            background: var(--wa-green); color: white; border: none;
            width: 100%; padding: 18px; border-radius: 10px;
            font-weight: bold; font-size: 1rem; text-transform: uppercase;
            cursor: pointer; text-decoration: none; display: block;
            box-sizing: border-box; transition: 0.3s;
        }

        .btn-wa:hover { background: #1ebd5e; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

    </style>
</head>
<body>

<div class="ticket-container" id="mainTicket">
    <div class="ticket-header">
        <h1>TIKET GEY</h1>
    </div>

    <div class="ticket-body">
        <img src="" alt="FOTO SOBBAT" id="friend-photo">

        <p class="personal-msg">Met Lebaran!</p>
        <p class="friend-name" id="display-name">Geyy</p>
        
        <p class="personal-msg">Papi Kirimin Dana Khusus:</p>
        <div class="amount" id="display-amount">Rp adadeh</div>
        <p class="sub-text">KLIK KIRIM CLAIM.</p>
        
        <a href="" id="wa-link" class="btn-wa">BUKA CHAT KLAIM 📲</a>
    </div>
</div>

<script>
    // Ambil Data dari URL (Nama & Nominal)
    const urlParams = new URLSearchParams(window.location.search);
    const namaTeman = urlParams.get('nama') || "SOBBAT";
    const nominal = urlParams.get('amount') || "0";
    const myWA = "6287768314233"; // Nomor WA Papi

    // --- LOGIKA MENAMPILKAN DATA (BARU & STABIL) ---
    // 1. Tampilkan Nama
    document.getElementById('display-name').innerText = namaTeman.toUpperCase();
    
    // 2. Tampilkan Nominal (Format Rupiah)
    document.getElementById('display-amount').innerText = "Rp" + parseInt(nominal).toLocaleString('id-ID');

    // 3. Logika AMBIL FOTO (Anti-Eror)
    // Kita paksa jadi huruf kecil semua, misal: ajet.jpeg, bintang.jpeg
    const photoImg = document.getElementById('friend-photo');
    photoImg.src = namaTeman.toLowerCase().trim() + ".jpeg"; 

    // --- SELEBRASI CONFETTI (WARNA EMAS & PUTIH) ---
    confetti({
        particleCount: 180,
        spread: 80,
        origin: { y: 0.6 },
        colors: ['#bf9b30', '#ffffff', '#e0e6ed']
    });

    // 4. Logika TOMBOL WHATSAPP (Anti-Macet)
    // Kita buat link-nya langsung siap saat halaman terbuka, jadi GAK BISA GAGAL DIKLIK.
    const msg = `Papi sayang! ✨ Aku ${namaTeman} sudah klaim Digital Golden Ticket Rp${parseInt(nominal).toLocaleString('id-ID')}. Tolong di-TF ke ShopeePay aku ya Pi! 🙏`;
    const waLink = `https://wa.me/${myWA}?text=${encodeURIComponent(msg)}`;
    document.getElementById('wa-link').href = waLink;
</script>

</body>
</html>
