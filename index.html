<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNTEN SAWIIITT 🌴 | ACCESS GRANTED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #03001c;
            --card-bg: rgba(18, 18, 35, 0.7);
            --accent-neon: #81e621;
            --shopee-orange: #ff4500;
            --text-main: #e0e6ed;
            --font-tech: 'Orbitron', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center;
        }

        body::before {
            content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(rgba(129, 230, 33, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(129, 230, 33, 0.05) 1px, transparent 1px);
            background-size: 60px 60px; transform: perspective(500px) rotateX(60deg);
            animation: gridMove 30s linear infinite; z-index: -1;
        }

        @keyframes gridMove { 100% { transform: perspective(500px) rotateX(60deg) translateY(60px); } }

        .thr-vault {
            background: var(--card-bg); border: 1px solid rgba(129, 230, 33, 0.3);
            border-radius: 20px; padding: 30px; width: 85%; max-width: 400px;
            text-align: center; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(129, 230, 33, 0.1);
        }

        .id-card {
            background: rgba(0, 0, 0, 0.5); border-radius: 12px; padding: 15px; margin-bottom: 20px;
            border-left: 4px solid var(--accent-neon);
        }

        .target-name { font-family: var(--font-tech); font-weight: 700; font-size: 1.6rem; text-shadow: 0 0 10px var(--accent-neon); margin: 0; }

        .input-field {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid #334155;
            padding: 12px; border-radius: 8px; color: white; font-size: 1.1rem;
            margin: 15px 0; box-sizing: border-box; outline: none;
        }

        .btn-claim {
            width: 100%; font-family: var(--font-tech); background: transparent;
            border: 2px solid var(--accent-neon); color: var(--accent-neon);
            padding: 15px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-claim:hover { background: var(--accent-neon); color: #000; box-shadow: 0 0 20px var(--accent-neon); }

        #friend-photo {
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--accent-neon); margin: 15px auto; display: none;
        }

        .amount { font-family: var(--font-tech); font-size: 2rem; margin: 10px 0; color: #fff; }
        
        #wa-btn {
            background: #25d366; color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="thr-vault">
    <div id="setup-view">
        <div class="id-card">
            <p style="font-size: 0.7rem; color: var(--accent-neon); margin:0;">>> SYSTEM ACCESS 🌴</p>
            <h1 class="target-name" id="display-name">LOADING...</h1>
        </div>
        <input type="number" id="spay-number" class="input-field" placeholder="Nomor ShopeePay">
        <button class="btn-claim" onclick="processTransfer()">VERIFIKASI & KLAIM</button>
        <p id="loading-txt" style="display:none; font-family: var(--font-tech); font-size: 0.8rem; margin-top: 15px;">PROCESSING...</p>
    </div>

    <div id="result" style="display:none;">
        <h2 style="color: var(--accent-neon); font-family: var(--font-tech);">GRANTED! 🌴</h2>
        <img src="" id="friend-photo">
        <div class="amount" id="display-amount"></div>
        <p style="font-size: 0.8rem;">Met Lebaran! THR siap cair ke nomor:<br><b id="final-num" style="color:var(--accent-neon)"></b></p>
        <button id="wa-btn" onclick="sendWA()">KIRIM BUKTI KE PAPI 📲</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const namaTeman = urlParams.get('nama') || "KM GEYY KAN";
    const nominal = urlParams.get('amount') || "50k";
    const myWA = "6287768314233"; // Nomor Kamu

    document.getElementById('display-name').innerText = namaTeman.toUpperCase();

    function processTransfer() {
        const phone = document.getElementById('spay-number').value;
        if (phone.length < 10) { alert("Nomor salah!"); return; }

        document.getElementById('loading-txt').style.display = 'block';
        document.querySelector('.btn-claim').style.display = 'none';

        // Fix Foto: Pakai lowercase agar cocok dengan file di GitHub
        const photoImg = document.getElementById('friend-photo');
        photoImg.src = namaTeman.toLowerCase() + ".jpeg"; 
        
        setTimeout(() => {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            photoImg.style.display = 'block';
            document.getElementById('display-amount').innerText = "Rp" + parseInt(nominal).toLocaleString('id-ID');
            document.getElementById('final-num').innerText = phone;
            document.getElementById('wa-btn').style.display = 'block';
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#81e621', '#ffffff'] });
        }, 2500);
    }

    function sendWA() {
        const phone = document.getElementById('spay-number').value;
        const msg = `Papi, aku ${namaTeman} sudah klaim THR Rp${parseInt(nominal).toLocaleString('id-ID')} ke ShopeePay ${phone}. Claim! 🌴`;
        window.open(`https://wa.me/${myWA}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
